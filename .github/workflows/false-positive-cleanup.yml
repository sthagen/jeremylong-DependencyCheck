name: False Positive Cleanup
on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

permissions: {}
jobs:
  cleanup:
    if: github.repository_owner == 'dependency-check'
    permissions:
      actions: write  #  to delete workflow runs

    runs-on: ubuntu-latest
    steps:
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@5bf9a1dac5c4d041c029f0a8370ddf0c5cb5aeb7 # v2.1.0
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0
          delete_workflow_pattern: 'false-positive'
          delete_run_by_conclusion_pattern: 'skipped'
